<!DOCTYPE html>
<html>
<head>
    <title>Analytics</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="dashboard">

    <!-- Sidebar -->
    <div class="sidebar">
        <h2>📘 Planner</h2>
        <ul>
            <li onclick="location.href='dashboard.html'">🏠 Dashboard</li>
            <li onclick="location.href='tasks.html'">📝 Tasks</li>
            <li onclick="location.href='analytics.html'">📊 Analytics</li>
        </ul>
    </div>

    <!-- Main -->
    <div class="main">
        <h1>📊 Analytics Dashboard</h1>

        <!-- Stats -->
        <div class="stats">
            <div class="card">
                📋 Total Tasks <br>
                <span id="totalTasks">0</span>
            </div>

            <div class="card">
                🔥 High Priority <br>
                <span id="highTasks">0</span>
            </div>
        </div>

        <!-- ✅ BAR CHART (FULL WIDTH) -->
        <div class="chart-container full">
            <h2>📊 Task Progress</h2>
            <canvas id="chart"></canvas>
        </div>

        <!-- ✅ SIDE BY SIDE CHARTS -->
        <div class="chart-row">

            <!-- PIE -->
            <div class="chart-container half">
                <h2>🔥 Priority Distribution</h2>
                <canvas id="pieChart"></canvas>
            </div>

            <!-- SUBJECT -->
            <div class="chart-container half">
                <h2>📚 Subject Distribution</h2>
                <canvas id="subjectChart"></canvas>
            </div>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="script.js"></script>

</body>
</html>
