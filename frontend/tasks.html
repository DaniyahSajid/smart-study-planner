<!DOCTYPE html>
<html>
<head>
    <title>Tasks</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="dashboard">

    <!-- Sidebar -->
    <div class="sidebar">
        <h2>📘 Planner</h2>
        <ul>
            <li onclick="location.href='dashboard.html'">🏠 Dashboard</li>
            <li onclick="location.href='tasks.html'">📝 Tasks</li>
            <li onclick="location.href='analytics.html'">📊 Analytics</li>
        </ul>
    </div>

    <!-- Main -->
    <div class="main">
        <h1>📝 Task Manager</h1>

        <!-- FORM SECTION -->
        <div class="form-card">
            <h2>➕ Add New Task</h2>

            <form id="taskForm">
                <input type="text" id="title" placeholder="Task Title" required>

                <input type="text" id="description" placeholder="Description">

                <input type="date" id="deadline">

                <select id="priority">
                    <option>Low</option>
                    <option>Medium</option>
                    <option>High</option>
                </select>

                <button type="submit">Add Task</button>
            </form>
        </div>

        <!-- TASK LIST -->
        <h2>📋 Your Tasks</h2>
        <ul id="taskList"></ul>

    </div>

</div>

<script src="script.js"></script>
</body>
</html>
