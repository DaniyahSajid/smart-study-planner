<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="dashboard">

    <!-- Sidebar -->
    <div class="sidebar">
        <h2>📘 Planner</h2>
        <ul>
            <li onclick="location.href='dashboard.html'">🏠 Dashboard</li>
            <li onclick="location.href='tasks.html'">📝 Tasks</li>
            <li onclick="location.href='analytics.html'">📊 Analytics</li>
        </ul>
    </div>

    <!-- Main -->
    <div class="main">
        <h1>📚 Smart Study Planner</h1>

        <!-- Stats Cards -->
        <div class="stats">
            <div class="card">
                📋 Total Tasks <br>
                <span id="totalTasks">0</span>
            </div>

            <div class="card">
                🔥 High Priority <br>
                <span id="highTasks">0</span>
            </div>

            <div class="card">
                ⏳ Pending Tasks <br>
                <span id="pendingTasks">0</span>
            </div>
        </div>

        <!-- Timer -->
        <h2>⏱ Focus Timer</h2>
        <div class="timer-box">
            <h1 id="timer">24:00:00</h1>

            <div class="timer-buttons">
                <button onclick="startTimer()">Start</button>
                <button onclick="pauseTimer()">Pause</button>
                <button onclick="resetTimer()">Reset</button>
            </div>
        </div>

        <!-- NEW SECTION (fills empty space) -->
        <h2>📌 Today’s Overview</h2>

        <div class="overview">
            <div class="overview-card">
                🎯 Stay consistent with your study plan  
            </div>

            <div class="overview-card">
                📈 Track progress in Analytics section  
            </div>

            <div class="overview-card">
                ⏳ Use timer for focused sessions  
            </div>
        </div>

    </div>

</div>

<script src="script.js"></script>
</body>
</html>
